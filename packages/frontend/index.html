<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: env(safe-area-inset-*) is 0 without it (notched
         phones); interactive-widget=resizes-content: Android Chrome 108+ stopped
         resizing the layout viewport for the soft keyboard by default, which hid
         the mobile terminal's key bar behind it (iOS ignores this — handled with
         a visualViewport listener instead). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#08080a" />
    <title>NARUKAMI · Project Runner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
